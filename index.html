<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Interactive - Ultimate Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505; /* To'q fon */
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .copyright {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #00f2ff;
            font-size: 0.5rem;
            font-weight: 175;
            letter-spacing: 12px;
            text-shadow: 0 0 10px #00f2ff, 0 0 25px #0081ff;
            z-index: 10;
            user-select: none;
            pointer-events: none;
        }

        /* TUTIB BO'LMAS NEON TUGMA */
        #runaway-btn {
            position: absolute;
            padding: 12px 30px;
            font-size: 1rem;
            background: transparent;
            color: #ff0055;
            border: 2px solid #ff0055;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 15px #ff0055;
            z-index: 20;
            transition: color 0.2s, border 0.2s, box-shadow 0.2s;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 5;
        }
    </style>
</head>
<body>

    <h1 class="copyright">© 2026 JAMWID.UNVRSL | BUILD WITH PASSION</h1>
    <button id="runaway-btn">CLICK ME</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('runaway-btn');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        const mouse = {
            x: null,
            y: null,
            radius: 130
        };

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        // TUGMA QOCHISH FUNKSIYASI
        const moveButton = () => {
            const x = Math.random() * (window.innerWidth - btn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - btn.offsetHeight - 40) + 20;
            btn.style.left = `${x}px`;
            btn.style.top = `${y}px`;
        };

        btn.addEventListener('mouseover', () => {
            moveButton();
            // Har safar qochganda neon rang o'zgaradi
            const neonColors = ['#ff0055', '#00f2ff', '#39ff14', '#bc13fe', '#ffff33'];
            const color = neonColors[Math.floor(Math.random() * neonColors.length)];
            btn.style.color = color;
            btn.style.borderColor = color;
            btn.style.boxShadow = `0 0 20px ${color}`;
        });

        // Dastlabki joylashuv
        moveButton();

        // ZARRACHALAR SINFI (BOYAGI MANTIQ)
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 2;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 35) + 5;
            }

            draw() {
                ctx.fillStyle = '#00f2ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    this.x -= (dx / distance) * force * this.density;
                    this.y -= (dy / distance) * force * this.density;
                } else {
                    if (this.x !== this.baseX) {
                        this.x -= (this.x - this.baseX) / 15;
                    }
                    if (this.y !== this.baseY) {
                        this.y -= (this.y - this.baseY) / 15;
                    }
                }
            }
        }

        function init() {
            particlesArray = [];
            // Zarrachalar sonini ekran hajmiga proporsional qilib belgilaymiz.
            // Bu katta ekranlarda yanada zichroq zarrachalar joylashishini ta'minlaydi.
            let numberOfParticles = Math.sqrt(canvas.width * canvas.height); // Zarrachalar soni ekran hajmiga proporsional
            for (let i = 0; i < numberOfParticles; i++) {
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                particlesArray.push(new Particle(x, y));
            }
        }

        // NUQTALARNI "IP" KABI ULASH
        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    // Chiziq tortish uchun masofani ko'paytiramiz, bu esa chiziqlar sonini ko'paytiradi.
                    if (distance < 90) { // Chiziqlar tortish masofasi biroz ko'paytirilgan
                        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - (distance / 90)})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connect();
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
